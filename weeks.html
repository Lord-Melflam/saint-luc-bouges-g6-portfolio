<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Weeks Tracker - Group 6 Portfolio</title>
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body>
  <main class="container">
    <div class="topbar">
      <span class="badge">Weeks Tracker</span>
      <div>
        <button type="button" onclick="setTheme('dark')">Dark</button>
        <button type="button" onclick="setTheme('light')">Light</button>
        <button type="button" onclick="setTheme('auto')">Auto</button>
      </div>
    </div>
    <h1>Weekly progress (W1 to W13)</h1>
    <p class="subtitle">Track progress by week and filter by stream and completion threshold.</p>

    <nav>
      <a href="index.html">Overview</a>
      <a href="weeks.html">Weeks</a>
      <a href="upstream.html">Upstream</a>
      <a href="during.html">During</a>
      <a href="downstream.html">Downstream</a>
      <a href="deliverables.html">Deliverables</a>
      <a href="references.html">References</a>
    </nav>

    <div class="filter-row">
      <select id="weeks-filter-stream">
        <option value="all">All streams</option>
        <option value="upstream">Upstream</option>
        <option value="during">During</option>
        <option value="downstream">Downstream</option>
      </select>
      <select id="weeks-filter-progress">
        <option value="0">Any progress</option>
        <option value="25">25% and above</option>
        <option value="50">50% and above</option>
        <option value="75">75% and above</option>
        <option value="100">Completed only (100%)</option>
      </select>
    </div>

    <section id="weeks-grid" class="week-grid"></section>

    <footer class="footer">
      <strong>Group 6</strong><br />
      Maurine Poncelet <span class="dot">•</span> Francois Meli <span class="dot">•</span> Lheo Rary <span class="dot">•</span> Jabrane Mouhtadi
    </footer>
  </main>
  <script src="assets/data.js"></script>
  <script src="assets/site.js"></script>
</body>
</html>
